<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 60 50" fill="#fff"
    fill-rule="evenodd" stroke="#000" stroke-linecap="round" stroke-linejoin="round">
    <defs>
        <symbol id="pc_with_monitor" overflow="visible">
            <!-- torre -->
            <rect x="0" y="10" width="15" height="30" fill="#046897" stroke="none" />
            <rect x="0" y="10" width="15" height="30" fill="none" stroke="#fff" stroke-width="0.8" />
            <polygon points="0,10 3,7 18,7 15,10" fill="#0779b3" stroke="#fff" stroke-width="0.8" />
            <polygon points="15,10 18,7 18,37 15,40" fill="#035276" stroke="#fff" stroke-width="0.8" />
            <!-- boton de encendido -->
            <circle cx="11" cy="15.3" r="0.8" fill="#e40707" />          
            <!-- puertos usb -->
            <rect x="2" y="15" width="2.3" height="1" fill="#000" stroke="#fff" stroke-width="0.1" />
            <rect x="2.3" y="15" width="1.7" height="0.5" fill="#fff" stroke="#fff" stroke-width="0" />
            <rect x="5" y="15" width="2.3" height="1" fill="#000" stroke="#fff" stroke-width="0.1" />
            <rect x="5.3" y="15" width="1.7" height="0.5" fill="#fff" stroke="#fff" stroke-width="0" />
            <!-- Monitor -->
            <!-- parte delantera -->
            <rect x="22" y="5" width="30" height="22" fill="#046897" stroke="none" />
            <rect x="22" y="5" width="30" height="22" fill="none" stroke="#fff" stroke-width="0.8" />
            <!-- parte superior -->
            <polygon points="22,5 25,2 55,2 52,5" fill="#0779b3" stroke="#fff" stroke-width="0.8" />
            <!-- parte derecha -->
            <polygon points="52,5 55,2 55,24 52,27" fill="#035276" stroke="#fff" stroke-width="0.8" />
            <!-- contenido de la pantalla-->
            <rect x="24" y="7" width="26" height="18" fill="#000" stroke="#fff" stroke-width="0.5" />            
            <!-- base del monitor -->
            <polygon points="32,35 42,35 39,32 35,32" fill="#046897" stroke="#fff" stroke-width="0.8" />
            <!-- cuello del monitor -->
            <polygon points="35,32 39,32 39,27 35,27" fill="#046897" stroke="#fff" stroke-width="0.8" />
            <!-- cable hdmi -->
            <path d="M18,25 C 20,25 20,30 25,30 L 35,30" fill="none" stroke="#fff" stroke-width="0.8" />            
        </symbol>
    </defs>
    <use xlink:href="#pc_with_monitor" x="5" y="5" />
</svg>