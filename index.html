<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>PackeTTrino</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./styles/0-main.css">
</head>

<body>

  <!-- PANTALLA DE INICIO -->

  <div id="loading-screen">
    <div class="loader-container">
      <div class="loader-animation">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
      </div>
      <h1>PackeTTrino</h1>
      <p>Simulador de Redes</p>
      <p> By Amín Pérez <span>(2025)</span> </p>
    </div>
  </div>

  <!-- OVERLAY -->

  <div class="modal-overlay"></div>

  <!-- SECCION PRINCIPAL -->

  <div id="root">

    <section class="board" ondragover="dragOverBoard(event)" ondrop="dropItem(event)" onclick="closeAllModals()">
      <svg ondragover="dragOverBoard(event)" id="svg-board" rope-start="startId" rope-end="endId"
        preserveAspectRatio="none" width="100%" height="100%" style="position: absolute; top: 0; left: 0;"></svg>
    </section>

    <section id="item-panel">
      <!--
      <div class="schema-selector">
        <select id="schema-selector" onchange="changeSchema(event)">
          <option value="network-one">Elije una red</option>
          <option value="net-one">Red de prueba</option>
        </select>
      </div>-->
      <div class="file-options">
        <button onclick="downloadState()"> Descargar Esquema </button>
        <input type="file" id="fileInput" accept=".html" data-content="Seleccionar archivo">
        <button onclick="loadState()"> Cargar Esquema </button>
      </div>

      <div class="item-panel-elements">
        <article class="item dynrouting" draggable="false">
          <img src="./assets/panel/dynrouter.png" alt="dynrouting" draggable="false" style="width: 100%; height: 100%;">
          <div class="pulse"></div>
          <div class="radar-line"></div>
        </article>
      </div>

    </section>
  </div>

  <!-- FORMULARIOS -->

  <form class="pc-form modal">

    <p id="form-item-id"></p>

    <label for="ip">Dirección IP (ipv4):</label>
    <input type="text" id="ip" name="ip" pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">

    <label for="netmask">Máscara de Red:</label>
    <input type="text" id="netmask" name="netmask" pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">

    <label for="gateway">Puerta de enlace:</label>
    <input type="text" id="gateway" name="gateway" pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">
    
    <label for="dns-server">Servidor DNS:</label>
    <input type="text" id="dns-server" name="dns-server" pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">

    <div class="form-item">
      <label for="dhcp"> Modo DHCP: </label>
      <input type="checkbox" id="dhcp" name="dhcp">
    </div>

    <button class="btn-modern-blue" type="submit">Guardar</button>

  </form>

  <form class="router-form modal">

    <p id="form-router-item-id"></p>

    <label for="ip-enp0s3">Interfaz enp0s3:</label>
    <input type="text" id="ip-enp0s3" name="ip-enp0s3" pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">
    <input type="text" name="netmask-enp0s3" id="netmask-enp0s3" pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">

    <label for="ip-enp0s8">Interfaz enp0s8:</label>
    <input type="text" id="ip-enp0s8" name="ip-enp0s8" pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">
    <input type="text" name="netmask-enp0s8" id="netmask-enp0s8"pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">

    <label for="ip-enp0s9">Interfaz enp0s9:</label>
    <input type="text" id="ip-enp0s9" name="ip-enp0s9" pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">
    <input type="text" name="netmask-enp0s9" id="netmask-enp0s9" pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">

    <button class="btn-modern-yellow" type="submit">Guardar</button>

  </form>

  <form class="dhcp-form modal">

    <p id="form-dhcp-item-id"></p>

    <div>
      <label for="ip-dhcp">IP:</label>
      <input type="text" id="ip-dhcp" name="ip-dhcp"
        pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">
    </div>

    <div>
      <label for="netmask-dhcp">Netmask:</label>
      <input type="text" id="netmask-dhcp" name="netmask-dhcp"
        pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">
    </div>

    <div>
      <label for="gateway-dhcp">Gateway:</label>
      <input type="text" id="gateway-dhcp" name="gateway-dhcp"
        pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">
    </div>

    <p> Opciones de Servicio </p>

    <div>
      <label for="range-start">Rango de IPs:</label>
      <input type="text" id="range-start" name="range-start"
        pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">
      <input type="text" id="range-end" name="range-end"
        pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">
    </div>

    <div>
      <label for="offer-netmask">Oferta Netmask:</label>
      <input type="text" id="offer-netmask" name="offer-netmask"
        pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">
    </div>

    <div>
      <label for="offer-gateway">Oferta Gateway:</label>
      <input type="text" id="offer-gateway" name="offer-gateway"
        pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">
    </div>

    <div>
      <label for="offer-dns">Oferta Servidor DNS:</label>
      <input type="text" id="offer-dns" name="offer-dns"
        pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">
    </div>

    <div>
      <label for="offer-lease-time">Oferta Tiempo de Alquiler:</label>
      <input type="text" id="offer-lease-time" name="offer-lease-time" pattern="^[0-9]+$">
    </div>

    <button class="btn-modern-blue" type="submit">Guardar</button>

  </form>

  <form class="dns-form modal">

    <p id="form-dns-item-id"></p>

    <label for="ip">Dirección IP (IPv4):</label>
    <input type="text" id="ip-dns" name="ip-dns" pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">

    <label for="netmask">Máscara de Red:</label>
    <input type="text" id="netmask-dns" name="netmask-dns" pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">

    <label for="gateway">Puerta de Enlace:</label>
    <input type="text" id="gateway-dns" name="gateway-dns" pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">

    <div class="form-item">
      <label for="dns-recursive">Servidor DNS Recursivo:</label>
      <input type="checkbox" id="dns-recursive" name="dns-recursive">
    </div>

    <button class="btn-modern-green" type="submit">Guardar</button>

  </form>

  <form class="dhcp-relay-form modal">
    <p id="form-dhcp-relay-item-id"></p>
    <label for="ip-relay">IP:</label>
    <input type="text" id="ip-relay" name="ip-relay"
      pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">
    <label for="netmask-relay">Netmask:</label>
    <input type="text" id="netmask-relay" name="netmask-relay"
      pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">
    <label for="gateway-relay">Gateway:</label>
    <input type="text" id="gateway-relay" name="gateway-relay"
      pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">
    <label for="main-server">IP del Servidor DHCP Principal:</label>
    <input type="text" id="main-server" name="main-server"
      pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">
    <button class="btn-modern-blue" type="submit">Guardar</button>
  </form>

  <form class="ping-form modal">

    <label for="ip1">Origen</label>
    <input type="text" id="ip1" name="ip1" placeholder="192.168.1.1" pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$" required>

    <label for="ip2">Destino</label>
    <input type="text" id="ip2" name="ip2" placeholder="192.168.1.1, www.google.com">

    <label for="speed">Tiempo de Animación (ms)</label>
    <input type="text" id="speed" name="speed" placeholder="1000">

    <input type="submit" value="Enviar Paquete">

  </form>

  <!-- COMPONENTES PRECARGADOS -->

  <div class="terminal-component" id="terminal-network" data-id="" style="display: none;">

    <p>
      <span>%></span>
      <input type="text" class="terminal-input" autofocus>
    </p>

    <div class="terminal-output"></div>

    <div class="editor-container" style="display: none;">

      <div class="editor-buttons">
        <p><span>^S</span>Guardar y Salir</p>
      </div>

      <p class="file-editor-error"></p>

      <textarea class="file-editor" data-file=""></textarea>

      <div class="editor-frame"> <span></span> </div>

    </div>

  </div>

  <div class="browser-component" data-id="" style="display: none;">

    <div class="browser-header">

      <div class="browser-controls">
        <button class="control close" aria-label="Cerrar"></button>
        <button class="control minimize" aria-label="Minimizar"></button>
        <button class="control maximize" aria-label="Maximizar"></button>
      </div>

      <div class="browser-tabs">
        <button class="tab active">Nueva pestaña</button>
      </div>

      <div class="browser-address-bar">

        <div class="address-bar-icons">
          <button class="icon back" aria-label="Atrás">◀</button>
          <button class="icon forward" aria-label="Adelante">▶</button>
          <button class="icon refresh" aria-label="Actualizar">↻</button>
        </div>
        
        <input type="text" class="address-input" placeholder="https://www.ejemplo.com" aria-label="Barra de direcciones">

        <div class="address-bar-icons">
          <button class="icon star" aria-label="Marcar como favorito">★</button>
          <button class="icon menu" aria-label="Menú">⋮</button>
        </div>

      </div>

    </div>

    <iframe class="browser-content"></iframe>

  </div>

  <article class="packet-traffic">
    <div class="filter-traffic">
      <input type="text">
      <button>Filtrar</button>
    </div>
    <table>
      <tr>
        <th>XID</th>
        <th>Protocol</th>
        <th>Type</th>
        <th>Origin IP</th>
        <th>Destination IP</th>
        <th>Origin MAC</th>
        <th>Destination MAC</th>
        <th>TTL</th>
      </tr>
    </table>
  </article>

  <!-- SCRIPT PRINCIPAL -->
  <script src="./src/env.js"></script>
  <script src="./src/0-main.js"></script>
  <!-- ANIMACIONES -->
  <script src="./animations/move-packet.js"></script>
  <!-- COMPONENTES -->
  <script src="./src/components/panel-items.json"></script>
  <script src="./src/components/terminal.js"></script>
  <script src="./src/components/text.js"></script>
  <script src="./src/components/board.js"></script>
  <script src="./src/components/browser.js"></script>
  <script src="./src/components/traffic.js"></script>
  <script src="./src/components/settings.js"></script>
  <script src="./src/components/popup.js"></script>
  <!-- FUNCIONES -->
  <script src="./src/network_functions/0-general-functions.js"></script>
  <script src="./src/network_functions/man.js"></script>
  <script src="./src/network_functions/help.js"></script>
  <script src="./src/network_functions/apache.js"></script>
  <script src="./src/network_functions/nano.js"></script>
  <script src="./src/network_functions/visual.js"></script>
  <script src="./src/network_functions/dhcp_functions.js"></script>
  <script src="./src/network_functions/arp_functions.js"></script>
  <script src="./src/network_functions/dig_functions.js"></script>
  <script src="./src/network_functions/ip-functions.js"></script>
  <script src="./src/network_functions/ping-functions.js"></script>
  <script src="./src/network_functions/tcp-functions.js"></script>
  <script src="./src/network_functions/http-functions.js"></script>
  <script src="./src/network_functions/firewall-functions.js"></script>
  <script src="./src/network_functions/dns-functions.js"></script>
  <script src="./src/network_functions/traceroute-functions.js"></script>
  <!-- OBJETOS -->
  <script src="./src/network_objects/dhcp-relay-agent.js"></script>
  <script src="./src/network_objects/dhcpserver.js"></script>
  <script src="./src/network_objects/pc.js"></script>
  <script src="./src/network_objects/router.js"></script>
  <script src="./src/network_objects/switch.js"></script>
  <script src="./src/network_objects/dnsServer.js"></script>
  <script src="./src/network_objects/cable.js"></script>
  <script src="./src/network_objects/object-modal-functions.js"></script>
  <!-- GENERADORES -->
  <script src="./src/generators/customGen.js"></script>
  <script src="./src/generators/dhcpGen.js"></script>
  <script src="./src/generators/dnsGen.js"></script>
  <script src="./src/generators/httpGen.js"></script>
  <script src="./src/generators/icmpGen.js"></script>
  <script src="./src/generators/tcpGen.js"></script>
  <!-- PROCESADORES -->
  <script src="./src/processors/dhcpRelayProc.js"></script>
  <script src="./src/processors/dhcpServerProc.js"></script>
  <script src="./src/processors/dnsServerProc.js"></script>
  <script src="./src/processors/pcProc.js"></script>
  <script src="./src/processors/routerProc.js"></script>
  <script src="./src/processors/switchProc.js"></script>
  <!-- CORTAFUEGOS -->
  <script src="./src/firewall/hostFirewall.js"></script>
  <script src="./src/firewall/routerFirewall.js"></script>
  <!-- VISUALIZADORES -->
  <script src="./src/visualizers/packetVisualize.js"></script>
  <script src="./src/packets.js"></script>
  <script src="./src/dynamic-routing.js"></script>
  <!-- ARCHIVOS -->
  <script src="./src/files/parser-network-file.js"></script>
  <script src="./src/files/parser-resolve-file.js"></script>
  <script src="./src/files/parser-index-file.js"></script>
  <script src="./src/files/parser-etc-hosts.js"></script>
  <!--PLANTILLAS-->
  <script src="./schemes/network-one.js"></script>
</body>

</html>
