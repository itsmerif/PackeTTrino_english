<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>PackeTTrino</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./styles/main.css">
  <link rel="stylesheet" href="./styles/board.css">
  <link rel="stylesheet" href="./styles/panel.css">
  <link rel="stylesheet" href="./styles/pc.css">
</head>

<body onload="init()">

  <div id="root">
    <section class="board" ondragover="dragOverBoard(event)" ondrop="dropItem(event)"></section>
    <section id="item-panel"></section>
  </div>

  <form class="pc-form" onsubmit="savePcSpecs(event); return false;" style="display: none;">
    <p id="form-item-id"></p>
    <label for="ip">IP:</label>
    <input type="text" id="ip" name="ip" placeholder="192.168.1.1" required>
    <label for="netmask">Netmask:</label>
    <input type="text" id="netmask" name="netmask" placeholder="255.255.255.0" required>
    <label for="gateway">Gateway:</label>
    <input type="text" id="gateway" name="gateway" placeholder="192.168.1.1" required>
    <button type="submit">Guardar</button>
  </form>
  
  <div class="pc-terminal" data-id= "" onclick="clickTerminal(event)" style="display: none;">
    <p>
      <span>C:\></span>
      <input type="text" onkeydown="sendCommand(event)" autofocus>
    </p>
    <p class="terminal-output"></pre>
  </div>

  <script src="./src/main.js"></script>
  <script src="./src/pc.js"></script>
  <script src="./src/functions.js"></script>
  <script src="./src/router.js"></script>
  <script src="./src/switch.js"></script>
  <script src="./src/server.js"></script>
  <script srC="./src/terminal.js"></script>

</body>

</html>
