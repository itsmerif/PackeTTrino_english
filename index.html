<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>PackeTTrino</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./assets/styles/0-main.css">
</head>

<body onload="init()">

  <div id="loading-screen">
    <div class="loader-container">
      <div class="loader-animation">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
      </div>
      <h1>PackeTTrino</h1>
      <p>Simulador de Redes</p>
      <p> By Amín Pérez <span>(2025)</span> </p>
    </div>
  </div>

  <div id="root">
    <section class="board" ondragover="dragOverBoard(event)" ondrop="dropItem(event)" onclick="closeAllModals()">
      <svg ondragover="dragOverBoard(event)" id="svg-board" rope-start="startId" rope-end="endId"
        preserveAspectRatio="none" width="100%" height="100%" style="position: absolute; top: 0; left: 0;"></svg>
    </section>
    <section id="item-panel">
      <div class="file-options">
        <button onclick="downloadState()"> Descargar Esquema </button>
        <input type="file" id="fileInput" accept=".html" data-content="Seleccionar archivo">
        <button onclick="loadState()"> Cargar Esquema </button>
      </div>
    </section>
  </div>

  <form class="pc-form" onsubmit="savePcSpecs(event); return false;" style="display: none;">
    <p id="form-item-id"></p>
    <label for="dhcp">Obtener una dirección IP automática (DHCP):</label>
    <input type="checkbox" id="dhcp" name="dhcp">
    <label for="ip">IP:</label>
    <input type="text" id="ip" name="ip"
      pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">
    <label for="netmask">Netmask:</label>
    <input type="text" id="netmask" name="netmask"
      pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">
    <label for="gateway">Gateway:</label>
    <input type="text" id="gateway" name="gateway"
      pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">
    <label for="dns-server">DNS Server:</label>
    <input type="text" id="dns-server" name="dns-server"
      pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">
    <button type="submit">Guardar</button>
  </form>

  <form class="router-form" onsubmit="saveRouterSpecs(event); return false;" style="display: none;">
    <p id="form-router-item-id"></p>
    <label for="ip-enp0s3">Enp0s3:</label>
    <input type="text" id="ip-enp0s3" name="ip-enp0s3" placeholder="192.168.1.1"
      pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">
    <input type="text" name="netmask-enp0s3" id="netmask-enp0s3" placeholder="255.255.255.0"
      pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">
    <label for="ip-enp0s8">Enp0s8:</label>
    <input type="text" id="ip-enp0s8" name="ip-enp0s8" placeholder="192.168.1.1"
      pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">
    <input type="text" name="netmask-enp0s8" id="netmask-enp0s8" placeholder="255.255.255.0"
      pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">
    <label for="ip-enp0s9">Enp0s9:</label>
    <input type="text" id="ip-enp0s9" name="ip-enp0s9" placeholder="192.168.1.1"
      pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">
    <input type="text" name="netmask-enp0s9" id="netmask-enp0s9" placeholder="255.255.255.0"
      pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">
    <button type="submit">Guardar</button>
  </form>

  <form class="dhcp-form" onsubmit="saveDhcpSpecs(event); return false;" style="display: none;">
    <p id="form-dhcp-item-id"></p>
  
    <div>
      <label for="ip-dhcp">IP:</label>
      <input type="text" id="ip-dhcp" name="ip-dhcp"
        pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">
    </div>
  
    <div>
      <label for="netmask-dhcp">Netmask:</label>
      <input type="text" id="netmask-dhcp" name="netmask-dhcp"
        pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">
    </div>
  
    <div>
      <label for="gateway-dhcp">Gateway:</label>
      <input type="text" id="gateway-dhcp" name="gateway-dhcp"
        pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">
    </div>
  
    <div>
      <label for="range-start">Rango de Servicio:</label>
      <input type="text" id="range-start" name="range-start"
        pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">
      <input type="text" id="range-end" name="range-end"
        pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">
    </div>
  
    <div>
      <label for="offer-gateway">Oferta Gateway:</label>
      <input type="text" id="offer-gateway" name="offer-gateway"
        pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">
    </div>
  
    <div>
      <label for="offer-netmask">Oferta Netmask:</label>
      <input type="text" id="offer-netmask" name="offer-netmask"
        pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">
    </div>
    
    <div>
      <label for="offer-dns">Oferta Servidor DNS:</label>
      <input type="text" id="offer-dns" name="offer-dns"
        pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">
    </div>

    <button type="submit">Guardar</button>
  </form>
  

  <form class="dns-form" onsubmit="saveDnsSpecs(event); return false;" style="display: none;">
    <p id="form-dns-item-id"></p>
    <label for="ip">IP:</label>
    <input type="text" id="ip-dns" name="ip-dns"
      pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">
    <label for="netmask">Netmask:</label>
    <input type="text" id="netmask-dns" name="netmask-dns"
      pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">
    <label for="gateway">Gateway:</label>
    <input type="text" id="gateway-dns" name="gateway-dns"
      pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">
    <label for="dns-recursive">DNS Recursive:</label>
    <input type="checkbox" id="dns-recursive" name="dns-recursive">
    <button type="submit">Guardar</button>
  </form>

  <form class="dhcp-relay-form" onsubmit="saveDhcpRelaySpecs(event); return false;" style="display: none;">
    <p id="form-dhcp-relay-item-id"></p>
    <label for="ip-relay">IP:</label>
    <input type="text" id="ip-relay" name="ip-relay"
      pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">
    <label for="netmask-relay">Netmask:</label>
    <input type="text" id="netmask-relay" name="netmask-relay"
      pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">
    <label for="gateway-relay">Gateway:</label>
    <input type="text" id="gateway-relay" name="gateway-relay"
      pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">
    <label for="main-server">Servidor DHCP Principal:</label>
    <input type="text" id="main-server" name="main-server"
      pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">
    <button type="submit">Guardar</button>
  </form>

  <div class="pc-terminal" id="terminal-network" data-id="" onclick="clickTerminal(event)" style="display: none;"
    onmousedown="dragTerminal(event)">

    <p>
      <span>%></span>
      <input type="text" class="terminal-input" onkeydown="sendCommand(event)" autofocus>
    </p>

    <div class="terminal-output"></div>

    <div class="editor-container" style="display: none;">
      <div class="editor-buttons">
        <button class="save-btn" onclick="closeEditor()" onmousedown="event.stopPropagation()"
          onmouseup="event.stopPropagation()">Guardar y Cerrar</button>
      </div>
      <p class="file-editor-error" onmousedown="event.stopPropagation()" onmouseup="event.stopPropagation()"></p>
      <textarea class="file-editor" data-file="" onclick="event.stopPropagation()" onmousedown="event.stopPropagation()"
        onmouseup="event.stopPropagation()" ondragstart="event.stopPropagation()" onkeydown="fileEditorKeyboard(event)">
      </textarea>
    </div>

  </div>

  <div class="pc-browser" onmousedown="dragBroswer(event)" data-id="" style="display: none;">
    <div class="browser-header">
      <div class="browser-controls">
        <button class="control close" aria-label="Cerrar" onclick="closeBrowser(event)"></button>
        <button class="control minimize" aria-label="Minimizar"></button>
        <button class="control maximize" aria-label="Maximizar"></button>
      </div>
      <div class="browser-tabs">
        <button class="tab active">Nueva pestaña</button>
      </div>
      <div class="browser-address-bar">
        <div class="address-bar-icons">
          <button class="icon back" aria-label="Atrás">◀</button>
          <button class="icon forward" aria-label="Adelante">▶</button>
          <button class="icon refresh" aria-label="Actualizar">↻</button>
        </div>
        <input type="text" class="address-input" placeholder="https://www.ejemplo.com" aria-label="Barra de direcciones"
          onkeydown="browserSearch(event)" onmousedown="event.stopPropagation()">
        <div class="address-bar-icons">
          <button class="icon star" aria-label="Marcar como favorito">★</button>
          <button class="icon menu" aria-label="Menú">⋮</button>
        </div>
      </div>
    </div>
    <iframe class="browser-content" onmousedown="event.stopPropagation()">
    </iframe>
  </div>

  <form class="ping-form" onsubmit="pingSim(); return false;" style="display: none;" onmousedown="dragPingForm(event)">
    <label for="ip1">Origen</label>
    <input type="text" id="ip1" name="ip1" placeholder="192.168.1.1"
      pattern="^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$" required>
    <label for="ip2">Destino</label>
    <input type="text" id="ip2" name="ip2" placeholder="192.168.1.1, www.google.com">
    <input type="submit" value="Enviar Paquete">
  </form>

  <article class="packet-traffic">
    <div class="filter-traffic">
      <input type="text">
      <button onclick="filterPacketTraffic()">Filtrar</button>
    </div>
    <table>
      <tr>
        <th>Transport Protocol</th>
        <th>Protocol</th>
        <th>Type</th>
        <th>Origin IP</th>
        <th>Destination IP</th>
        <th>Origin MAC</th>
        <th>Destination MAC</th>
        <th>Sequence Number</th>
        <th>Acknowledgement Number</th>
      </tr>
    </table>
  </article>

  <!-- ANIMACIONES -->
  <script src="./src/animations/move-packet.js"></script>
  <!-- COMPONENTES -->
  <script src="./src/components/panel-items.json"></script>
  <script src="./src/components/terminal.js"></script>
  <script src="./src/components/text.js"></script>
  <script src="./src/components/0-main.js"></script>
  <script src="./src/components/board.js"></script>
  <script src="./src/components/cable.js"></script>
  <script src="./src/components/browser.js"></script>
  <!-- FUNCIONES -->
  <script src="./src/network_functions/general-functions.js"></script>
  <script src="./src/network_functions/dhcp_functions.js"></script>
  <script src="./src/network_functions/arp_functions.js"></script>
  <script src="./src/network_functions/dig_functions.js"></script>
  <script src="./src/network_functions/ip-functions.js"></script>
  <script src="./src/network_functions/ping-functions.js"></script>
  <script src="./src/network_functions/tcp-functions.js"></script>
  <script src="./src/network_functions/http-functions.js"></script>
  <script src="./src/network_functions/apache-functions.js"></script>
  <script src="./src/network_functions/firewall-functions.js"></script>
  <script src="./src/network_functions/dns-functions.js"></script>
  <!-- OBJETOS -->
  <script src="./src/network_objects/dhcp-relay-agent.js"></script>
  <script src="./src/network_objects/dhcpserver.js"></script>
  <script src="./src/network_objects/pc.js"></script>
  <script src="./src/network_objects/router.js"></script>
  <script src="./src/network_objects/switch.js"></script>
  <script src="./src/network_objects/dnsServer.js"></script>
  <!-- PROTOCOLOS -->
  <script src="./src/protocols/pack-flow.js"></script>
  <script src="./src/protocols/packets.js"></script>
  <script src="./src/protocols/dynamic-routing.js"></script>
  <!-- PARSER -->
  <script src="./src/files/parser-network-file.js"></script>
  <script src="./src/files/parser-resolve-file.js"></script>
  <script src="./src/files/parser-index-file.js"></script>

</body>

</html>
